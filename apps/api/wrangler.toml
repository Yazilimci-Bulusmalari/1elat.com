name = "1elat-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
account_id = "07a66e46f94888850bd39f0f732d9556"
routes = [{ pattern = "api.1elat.com", custom_domain = true }]

[[d1_databases]]
binding = "DB"
database_name = "1elat-db"
database_id = "0e8e0511-87c3-4fa5-9ddc-36fa6ad810ef"
migrations_dir = "../../packages/db/migrations"

[[kv_namespaces]]
binding = "SESSION"
id = "05cdcbfe35664315b9b5fb2a301d1f28"

[[r2_buckets]]
binding = "FILES"
bucket_name = "1elat-files"

# [[queues.producers]]
# binding = "NOTIFICATIONS"
# queue = "1elat-notifications"

# Public OAuth client IDs (safe in repo). Secrets: GITHUB_CLIENT_SECRET, GOOGLE_CLIENT_SECRET
# via `pnpm secrets:push` (reads from your shell env, never committed).
[vars]
API_VERSION = "0.1.0"
CORS_ORIGIN = "https://1elat.com"
GITHUB_REDIRECT_URI = "https://api.1elat.com/auth/github/callback"
GOOGLE_REDIRECT_URI = "https://api.1elat.com/auth/google/callback"
GITHUB_CLIENT_ID = "Ov23li8j4ykTpKlurpha"
GOOGLE_CLIENT_ID = "555575126722-rljjpbbq1sc4rptar7h2hghap1kuflg7.apps.googleusercontent.com"
# Admin promotion - login sirasinda eslesen email'lere admin rolu atanir (idempotent).
# Virgulle ayrilmis liste. Production'da `wrangler secret put ADMIN_EMAILS` ile veya
# burada [vars] altinda set edilir. Asagidaki ornek YORUM olarak biraktir.
# ADMIN_EMAILS = "abdullah@example.com,seda@example.com"
