name = "1elat-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"

[[d1_databases]]
binding = "DB"
database_name = "1elat-db"
database_id = "placeholder-d1-id" # Replace with actual D1 database ID

[[kv_namespaces]]
binding = "SESSION"
id = "placeholder-kv-id" # Replace with actual KV namespace ID

[[r2_buckets]]
binding = "FILES"
bucket_name = "1elat-files"

[[queues.producers]]
binding = "NOTIFICATIONS"
queue = "1elat-notifications"

[vars]
API_VERSION = "0.1.0"
# Secrets (set via `wrangler secret put`):
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
